<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 250 250" width="250" height="250">
  <rect width="250" height="250" fill="#f9fafb" rx="16"/>
  <!-- Outer Einstein ring -->
  <circle cx="125" cy="125" r="72" fill="none" stroke="#2563eb" stroke-width="3" opacity="0.9"/>
  <!-- Secondary arc (partial) -->
  <path d="M 60 100 A 80 80 0 0 1 190 100" fill="none" stroke="#2563eb" stroke-width="1.5" opacity="0.4"/>
  <!-- Lens mass (cross) -->
  <circle cx="125" cy="125" r="7" fill="#2563eb" opacity="0.85"/>
  <!-- Source (small orange dot, offset) -->
  <circle cx="148" cy="110" r="4" fill="#f59e0b" opacity="0.9"/>
  <!-- Four images around lens -->
  <circle cx="125" cy="53"  r="5" fill="#2563eb" opacity="0.55"/>
  <circle cx="125" cy="197" r="5" fill="#2563eb" opacity="0.55"/>
  <circle cx="53"  cy="125" r="5" fill="#2563eb" opacity="0.55"/>
  <circle cx="197" cy="125" r="5" fill="#2563eb" opacity="0.55"/>
</svg>
