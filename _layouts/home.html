---
layout: compress
---

{% include base_path %}

<!doctype html>
<html lang="{{ site.locale | slice: 0,2 }}" class="no-js">
  <head>
    {% include head.html %}
    {% include head/custom.html %}
    <style>
      /* =========================================================================
         Homepage: a single full-bleed caustic hero screen.
         Palette is exactly three colours: background, ink, one blue accent.
         Greys are ink at reduced alpha (color-mix), not a fourth colour.
         Scoped to body.home-page so no other page is affected.
         ========================================================================= */
      .home-page {
        --bg: #0d1117; --ink: #e6edf3; --accent: #93c5fd;
        --muted: color-mix(in srgb, var(--ink) 64%, transparent);
        --faint: color-mix(in srgb, var(--ink) 42%, transparent);
        --hair:  color-mix(in srgb, var(--ink) 18%, transparent);
        --art-opacity: 0.92;
        --scrim: 13, 17, 23;
        margin: 0; padding: 0;
        background: var(--bg); color: var(--ink);
        overflow-x: hidden;
      }
      html[data-theme="light"] .home-page {
        --bg: #ffffff; --ink: #1f2933; --accent: #4a7ec5;
        --muted: color-mix(in srgb, var(--ink) 60%, transparent);
        --faint: color-mix(in srgb, var(--ink) 40%, transparent);
        --hair:  color-mix(in srgb, var(--ink) 14%, transparent);
        --art-opacity: 0.82;
        --scrim: 255, 255, 255;
      }

      /* nav overlaid on the art, fixed so it persists as you scroll */
      .home-page .masthead {
        position: fixed; top: 0; left: 0; right: 0; z-index: 30;
        background: transparent !important; border-bottom: none !important;
      }
      .home-page .greedy-nav { background: transparent !important; }

      /* ---- fixed background layers ---- */
      /* No transform: each background renders exactly as authored (orientation is
         baked into the file). Starts transparent and fades in once the
         randomly-chosen SVG has been fetched and themed. */
      .home-page .hero-art {
        position: fixed; inset: 0; z-index: 0; pointer-events: none;
        opacity: 0; transition: opacity 0.55s ease;
      }
      .home-page .hero-art.is-loaded { opacity: 1; }
      .home-page .hero-art svg {
        width: 100%; height: 100%; color: var(--accent);
        opacity: var(--art-opacity);
      }
      /* left-weighted scrim: keeps left-aligned text legible over the art on both
         screens (the art's dense arc sits on the right), and never fades out so the
         backdrop stays continuous down the whole page */
      .home-page .scrim-main {
        position: fixed; inset: 0; z-index: 1; pointer-events: none;
        background: linear-gradient(to right,
          rgba(var(--scrim), 0.92) 0%, rgba(var(--scrim), 0.62) 34%,
          rgba(var(--scrim), 0.16) 60%, rgba(var(--scrim), 0) 78%);
      }
      .home-page .scrim-top {
        position: fixed; top: 0; left: 0; right: 0; height: 130px; z-index: 2; pointer-events: none;
        background: linear-gradient(to bottom, rgba(var(--scrim), 0.85), rgba(var(--scrim), 0));
      }

      .home-page .home-main { position: relative; z-index: 5; }

      /* ---- hero foreground (single screen) ---- */
      .home-page .hero-fg {
        position: relative; min-height: 100vh; display: flex; align-items: flex-end;
      }
      .home-page .hero-inner { max-width: 1180px; margin: 0 auto; padding: 0 2rem 8vh; width: 100%; }
      .home-page .avatar {
        width: 175px; height: 175px; border-radius: 50%; object-fit: cover; display: block;
        margin-bottom: 1.15rem; border: 2px solid color-mix(in srgb, var(--accent) 60%, transparent);
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.22);
      }
      .home-page .eyebrow {
        margin: 0 0 0.9rem; font-size: 0.72rem; font-weight: 700; letter-spacing: 0.16em;
        text-transform: uppercase; color: var(--accent);
      }
      .home-page .name {
        margin: 0; font-size: clamp(2.6rem, 6.5vw, 4.6rem); font-weight: 800;
        letter-spacing: -0.03em; line-height: 0.98; color: var(--ink);
      }
      .home-page .name .pron {
        display: block; font-size: 0.9rem; font-weight: 500; letter-spacing: 0;
        color: var(--faint); margin-top: 0.6rem;
      }
      .home-page .summary {
        margin: 1.2rem 0 0; font-size: clamp(1rem, 1.5vw, 1.2rem);
        color: var(--muted); max-width: 34rem; line-height: 1.55;
      }
      .home-page .summary .kw { color: var(--accent); font-weight: 600; }
      .home-page .links { display: flex; flex-wrap: wrap; gap: 1.6rem; margin: 1.8rem 0 0; padding: 0; list-style: none; }
      /* :visited pinned to --ink so clicked links don't turn the theme's purple */
      .home-page .links a,
      .home-page .links a:visited {
        color: var(--ink); text-decoration: none; font-size: 0.98rem; font-weight: 500;
        display: inline-flex; align-items: center; gap: 0.45rem;
      }
      .home-page .links a svg { width: 17px; height: 17px; flex-shrink: 0; color: var(--faint); transition: color 0.15s; }
      .home-page .links a .arr { color: var(--faint); transition: transform 0.18s, color 0.15s; }
      .home-page .links a:hover { color: var(--accent); }
      .home-page .links a:hover svg { color: var(--accent); }
      .home-page .links a:hover .arr { color: var(--accent); transform: translateX(3px); }

      .home-page .credit {
        position: absolute; right: 2rem; bottom: 8vh; z-index: 2;
        display: inline-flex; align-items: center; gap: 0.45rem;
        padding: 0.5rem 0.85rem; border-radius: 999px;
        background: color-mix(in srgb, var(--bg) 55%, transparent);
        backdrop-filter: blur(7px); -webkit-backdrop-filter: blur(7px);
        border: 1px solid var(--hair); color: var(--muted); text-decoration: none; font-size: 0.82rem;
        white-space: nowrap; transition: color 0.15s, border-color 0.15s;
      }
      .home-page .credit b { color: var(--ink); font-weight: 600; }
      .home-page .credit .arr { color: var(--accent); }
      .home-page .credit:hover { color: var(--ink); border-color: var(--accent); }

      @media (max-width: 640px) {
        /* keep the credit visible but move it to a centered strip below the hero
           content (at the right edge it would collide with the wrapped links);
           trim the content's bottom padding to leave room for it */
        .home-page .hero-inner { padding-bottom: 4.75rem; }
        .home-page .credit {
          right: auto; left: 50%; transform: translateX(-50%);
          bottom: 1.25rem; font-size: 0.74rem; padding: 0.4rem 0.72rem;
        }
        .home-page .avatar { width: 132px; height: 132px; }
      }
      @media (prefers-reduced-motion: reduce) {
        .home-page * { transition: none !important; }
      }
    </style>
  </head>

  <body class="home-page">

    {% include browser-upgrade.html %}
    {% include masthead.html %}

    <!-- Background SVG: one file, chosen at random from
         images/backgrounds/homepage_*.svg, is fetched and injected here. -->
    <div class="hero-art" id="heroArt"></div>
    <div class="scrim-main" id="scrimMain" aria-hidden="true"></div>
    <div class="scrim-top" id="scrimTop" aria-hidden="true"></div>

    <!-- Kick the background fetch off here, before the theme's blocking JS
         (scripts.html) below, so it starts as early as possible. -->
    <script>
      (function () {
        var host = document.getElementById('heroArt');
        if (!host) return;
        /* BGS is built at BUILD time by scanning the site's static files, so
           dropping a new images/backgrounds/homepage_N.svg into the repo is all
           that's needed - no edit here. One is picked at random per load. */
        var BGS = [
          {%- for f in site.static_files -%}
            {%- if f.extname == '.svg' and f.path contains '/images/backgrounds/homepage_' -%}
              "{{ f.path }}",
            {%- endif -%}
          {%- endfor -%}
        ];
        if (!BGS.length) return;
        var url = BGS[Math.floor(Math.random() * BGS.length)];

        fetch(url).then(function (r) { return r.text(); }).then(function (txt) {
          host.innerHTML = txt;
          var svg = host.querySelector('svg');
          if (!svg) return;
          themeSvg(svg);
          svg.setAttribute('preserveAspectRatio', 'xMidYMid slice');
          svg.setAttribute('aria-hidden', 'true');
          host.classList.add('is-loaded');   /* fade in only once themed */
        }).catch(function () {});

        /* Normalise an uploaded SVG to the site's look:
           1. drop the full-canvas background rect so the page background shows
              through (homepage_0 has none; the others bake in a solid rect), then
           2. repaint every remaining colour to currentColor, which the CSS
              `color: var(--accent)` resolves to the theme accent in light + dark.
           'none' is preserved so unfilled / line-art shapes stay unfilled. */
        function themeSvg(svg) {
          var vb = (svg.getAttribute('viewBox') || '').split(/[\s,]+/);
          var W = vb.length === 4 ? parseFloat(vb[2]) : parseFloat(svg.getAttribute('width'));
          var H = vb.length === 4 ? parseFloat(vb[3]) : parseFloat(svg.getAttribute('height'));
          var rects = svg.querySelectorAll('rect');
          for (var i = 0; i < rects.length; i++) {
            var r = rects[i];
            var w = parseFloat(r.getAttribute('width'));
            var h = parseFloat(r.getAttribute('height'));
            var x = parseFloat(r.getAttribute('x')) || 0;
            var y = parseFloat(r.getAttribute('y')) || 0;
            if (W && H && w >= W - 1 && h >= H - 1 && x <= 1 && y <= 1) {
              r.parentNode.removeChild(r);
            }
          }
          var nodes = svg.querySelectorAll('*');
          for (var j = 0; j < nodes.length; j++) recolour(nodes[j]);
        }

        function recolour(el) {
          ['fill', 'stroke'].forEach(function (a) {
            var v = el.getAttribute(a);
            if (v && v !== 'none' && v !== 'currentColor') el.setAttribute(a, 'currentColor');
          });
          var sc = el.getAttribute('stop-color');
          if (sc && sc !== 'currentColor') el.setAttribute('stop-color', 'currentColor');
          var st = el.getAttribute('style');
          if (st) {
            var nst = st.replace(/(fill|stroke)\s*:\s*([^;]+)/gi, function (m, prop, val) {
              val = val.trim().toLowerCase();
              return (val === 'none' || val === 'currentcolor') ? m : prop + ':currentColor';
            });
            if (nst !== st) el.setAttribute('style', nst);
          }
        }
      })();
    </script>

    <main class="home-main">
      {{ content }}
    </main>

    {% include scripts.html %}

  </body>
</html>
