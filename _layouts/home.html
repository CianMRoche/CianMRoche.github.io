---
layout: compress
---

{% include base_path %}

<!doctype html>
<html lang="{{ site.locale | slice: 0,2 }}" class="no-js">
  <head>
    {% include head.html %}
    {% include head/custom.html %}
    <style>
      /* =========================================================================
         Homepage: full-bleed caustic hero + a scroll-in About/contact panel.
         Palette is exactly three colours: background, ink, one blue accent.
         Greys are ink at reduced alpha (color-mix), not a fourth colour.
         Scoped to body.home-page so no other page is affected.
         ========================================================================= */
      .home-page {
        --bg: #0d1117; --ink: #e6edf3; --accent: #93c5fd;
        --muted: color-mix(in srgb, var(--ink) 64%, transparent);
        --faint: color-mix(in srgb, var(--ink) 42%, transparent);
        --hair:  color-mix(in srgb, var(--ink) 18%, transparent);
        --art-opacity: 0.92;
        --scrim: 13, 17, 23;
        margin: 0; padding: 0;
        background: var(--bg); color: var(--ink);
        overflow-x: hidden;
      }
      html[data-theme="light"] .home-page {
        --bg: #ffffff; --ink: #1f2933; --accent: #4a7ec5;
        --muted: color-mix(in srgb, var(--ink) 60%, transparent);
        --faint: color-mix(in srgb, var(--ink) 40%, transparent);
        --hair:  color-mix(in srgb, var(--ink) 14%, transparent);
        --art-opacity: 0.82;
        --scrim: 255, 255, 255;
      }

      /* nav overlaid on the art, fixed so it persists as you scroll */
      .home-page .masthead {
        position: fixed; top: 0; left: 0; right: 0; z-index: 30;
        background: transparent !important; border-bottom: none !important;
      }
      .home-page .greedy-nav { background: transparent !important; }

      /* ---- fixed background layers ---- */
      /* mirror lives here (once) so the big arc sits on the right; the JS keeps
         the same single scaleX(-1) and only adds the zoom */
      .home-page .hero-art { position: fixed; inset: 0; z-index: 0; pointer-events: none; will-change: transform; transform: scaleX(-1); }
      .home-page .hero-art svg {
        width: 100%; height: 100%; color: var(--accent);
        opacity: var(--art-opacity);
      }
      /* left-weighted scrim: keeps left-aligned text legible over the art on both
         screens (the art's dense arc sits on the right), and never fades out so the
         backdrop stays continuous down the whole page */
      .home-page .scrim-main {
        position: fixed; inset: 0; z-index: 1; pointer-events: none;
        background: linear-gradient(to right,
          rgba(var(--scrim), 0.92) 0%, rgba(var(--scrim), 0.62) 34%,
          rgba(var(--scrim), 0.16) 60%, rgba(var(--scrim), 0) 78%);
      }
      .home-page .scrim-top {
        position: fixed; top: 0; left: 0; right: 0; height: 130px; z-index: 2; pointer-events: none;
        background: linear-gradient(to bottom, rgba(var(--scrim), 0.85), rgba(var(--scrim), 0));
      }

      .home-page .home-main { position: relative; z-index: 5; }

      /* ---- hero foreground (first screen) ---- */
      .home-page .hero-fg {
        position: relative; min-height: 100vh; display: flex; align-items: flex-end;
        will-change: transform, opacity;
      }
      .home-page .hero-inner { max-width: 1180px; margin: 0 auto; padding: 0 2rem 8vh; width: 100%; }
      .home-page .avatar {
        width: 175px; height: 175px; border-radius: 50%; object-fit: cover; display: block;
        margin-bottom: 1.15rem; border: 2px solid color-mix(in srgb, var(--accent) 60%, transparent);
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.22);
      }
      .home-page .eyebrow {
        margin: 0 0 0.9rem; font-size: 0.72rem; font-weight: 700; letter-spacing: 0.16em;
        text-transform: uppercase; color: var(--accent);
      }
      .home-page .name {
        margin: 0; font-size: clamp(2.6rem, 6.5vw, 4.6rem); font-weight: 800;
        letter-spacing: -0.03em; line-height: 0.98; color: var(--ink);
      }
      .home-page .name .pron {
        display: block; font-size: 0.9rem; font-weight: 500; letter-spacing: 0;
        color: var(--faint); margin-top: 0.6rem;
      }
      .home-page .summary {
        margin: 1.2rem 0 0; font-size: clamp(1rem, 1.5vw, 1.2rem);
        color: var(--muted); max-width: 34rem; line-height: 1.55;
      }
      .home-page .summary .kw { color: var(--accent); font-weight: 600; }
      .home-page .links { display: flex; flex-wrap: wrap; gap: 1.6rem; margin: 1.8rem 0 0; padding: 0; list-style: none; }
      .home-page .links a {
        color: var(--ink); text-decoration: none; font-size: 0.98rem; font-weight: 500;
        display: inline-flex; align-items: center; gap: 0.45rem;
      }
      .home-page .links a svg { width: 17px; height: 17px; flex-shrink: 0; color: var(--faint); transition: color 0.15s; }
      .home-page .links a .arr { color: var(--faint); transition: transform 0.18s, color 0.15s; }
      .home-page .links a:hover { color: var(--accent); }
      .home-page .links a:hover svg { color: var(--accent); }
      .home-page .links a:hover .arr { color: var(--accent); transform: translateX(3px); }

      .home-page .credit {
        position: absolute; right: 2rem; bottom: 8vh; z-index: 2;
        display: inline-flex; align-items: center; gap: 0.45rem;
        padding: 0.5rem 0.85rem; border-radius: 999px;
        background: color-mix(in srgb, var(--bg) 55%, transparent);
        backdrop-filter: blur(7px); -webkit-backdrop-filter: blur(7px);
        border: 1px solid var(--hair); color: var(--muted); text-decoration: none; font-size: 0.82rem;
        transition: color 0.15s, border-color 0.15s;
      }
      .home-page .credit b { color: var(--ink); font-weight: 600; }
      .home-page .credit .arr { color: var(--accent); }
      .home-page .credit:hover { color: var(--ink); border-color: var(--accent); }

      /* scroll cue */
      .home-page .scroll-cue {
        position: absolute; left: 50%; bottom: 1.6rem; transform: translateX(-50%);
        color: var(--faint); z-index: 2; animation: cue-bounce 1.9s ease-in-out infinite;
      }
      @keyframes cue-bounce { 0%,100% { transform: translate(-50%, 0); } 50% { transform: translate(-50%, 6px); } }

      /* ---- About / contact panel (scroll-in) ---- */
      /* transparent so the fixed caustic backdrop shows through here too */
      .home-page .home-below {
        position: relative; z-index: 5; background: transparent;
        min-height: 100vh; display: flex; align-items: center;
        text-shadow: 0 1px 14px rgba(var(--scrim), 0.55);
      }
      .home-page .below-inner { max-width: 1180px; margin: 0 auto; padding: 7rem 2rem; width: 100%; display: grid; gap: 3.2rem; }
      .home-page .section-label {
        font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.16em;
        color: var(--accent); font-weight: 700; margin: 0 0 1rem;
      }
      .home-page .about-text { margin: 0; font-size: clamp(1.1rem, 1.7vw, 1.4rem); line-height: 1.6; color: var(--ink); font-weight: 400; max-width: 46rem; }
      .home-page .about-text a { color: var(--accent); text-decoration: none; border-bottom: 1px solid color-mix(in srgb, var(--accent) 45%, transparent); }
      .home-page .contact-links { display: flex; flex-wrap: wrap; gap: 1.5rem; }
      /* opaque muted (not the alpha-based --muted) so visited links, e.g. the MIT
         page, don't render brighter than the others under the :visited privacy rules */
      .home-page .contact-links a,
      .home-page .contact-links a:visited { color: color-mix(in srgb, var(--ink) 64%, var(--bg)); text-decoration: none; font-size: 1.02rem; transition: color 0.15s; }
      .home-page .contact-links a:hover { color: var(--accent); }

      @media (max-width: 640px) {
        .home-page .credit { display: none; }
        .home-page .avatar { width: 132px; height: 132px; }
      }
      @media (prefers-reduced-motion: reduce) {
        .home-page * { transition: none !important; }
        .home-page .scroll-cue { animation: none; }
      }
    </style>
  </head>

  <body class="home-page">

    {% include browser-upgrade.html %}
    {% include masthead.html %}

    <div class="hero-art" id="heroArt">{% include hero-caustic.html %}</div>
    <div class="scrim-main" id="scrimMain" aria-hidden="true"></div>
    <div class="scrim-top" id="scrimTop" aria-hidden="true"></div>

    <main class="home-main">
      {{ content }}
    </main>

    {% include scripts.html %}

    <script>
      (function () {
        var art  = document.getElementById('heroArt');
        var fg   = document.getElementById('heroFg');
        var sm   = document.getElementById('scrimMain');
        var st   = document.getElementById('scrimTop');
        var cue  = document.querySelector('.home-page .scroll-cue');
        if (!art || !fg) return;
        var reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        var ticking = false;

        function clamp01(x) { return x < 0 ? 0 : (x > 1 ? 1 : x); }

        function apply() {
          ticking = false;
          var s = window.pageYOffset || document.documentElement.scrollTop || 0;
          var vh = window.innerHeight || 1;
          // Background rushes up faster than the page (1.25x); foreground drifts up
          // slower (0.7x) and fades. Reduced-motion: leave everything at rest.
          if (reduce) { art.style.transform = 'scaleX(-1)'; return; }
          // Background is a continuous fixed backdrop for the whole page; a gentle
          // zoom gives depth without ever leaving a gap (translating it would).
          var maxS = Math.max(1, document.documentElement.scrollHeight - vh);
          var p = clamp01(s / maxS);
          art.style.transform = 'scaleX(-1) scale(' + (1 + p * 0.06).toFixed(4) + ')';
          // Foreground drifts up slower than the scroll and fades as the hero
          // hands off to the panel; scrims stay so the backdrop reads as one scene.
          fg.style.transform  = 'translate3d(0,' + (s * 0.28).toFixed(1) + 'px,0)';
          fg.style.opacity    = clamp01(1 - s / (vh * 0.62));
          if (cue) cue.style.opacity = clamp01(1 - s / (vh * 0.25));
        }
        function onScroll() { if (!ticking) { ticking = true; requestAnimationFrame(apply); } }

        window.addEventListener('scroll', onScroll, { passive: true });
        window.addEventListener('resize', apply);
        apply();
      })();
    </script>

  </body>
</html>
