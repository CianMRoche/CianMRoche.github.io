---
layout: default
---

{% include base_path %}

<script>(function(){var t=localStorage.getItem('theme')||'dark';document.documentElement.setAttribute('data-theme',t);})();</script>

<style>
.doc-wrap {
  display: flex;
  max-width: 1100px;
  margin: 0 auto;
  padding: 32px 24px 80px;
  gap: 48px;
  align-items: flex-start;
}
.doc-sidebar {
  flex: 0 0 200px;
  position: sticky;
  top: 80px;
  max-height: calc(100vh - 120px);
  overflow-y: auto;
  overflow-x: hidden;
  font-size: 0.82rem;
}
.doc-sidebar-title {
  font-size: 0.7rem;
  font-weight: 700;
  letter-spacing: 0.09em;
  text-transform: uppercase;
  color: #6b7280;
  margin-bottom: 10px;
}
html[data-theme="dark"] .doc-sidebar-title { color: #8b949e; }
.doc-toc-list { list-style: none; padding: 0; margin: 0; }
.doc-toc-list li { margin-bottom: 2px; }
.doc-toc-list a {
  display: block;
  padding: 3px 0;
  color: #6b7280;
  text-decoration: none;
  line-height: 1.4;
  border-left: 2px solid transparent;
  padding-left: 8px;
}
html[data-theme="dark"] .doc-toc-list a { color: #8b949e; }
.doc-toc-list a:hover { color: #1f2937; border-left-color: #9ca3af; }
html[data-theme="dark"] .doc-toc-list a:hover { color: #e6edf3; border-left-color: #6e7681; }
.doc-toc-list a.active { color: #2563eb; border-left-color: #2563eb; font-weight: 500; }
html[data-theme="dark"] .doc-toc-list a.active { color: #7bbfcc; border-left-color: #7bbfcc; }
.doc-toc-list .toc-h3 a { padding-left: 20px; font-size: 0.78rem; }
.doc-content { flex: 1; min-width: 0; }

/* ── Section headers: each numbered section opens with a top rule + accent bar ── */
.doc-content h2 {
  margin-top: 2.6em;
  padding-top: 1.0em;
  border-top: 1px solid #e5e7eb;
  font-size: 1.45rem;
  line-height: 1.3;
}
html[data-theme="dark"] .doc-content h2 { border-top-color: #30363d; }
/* A vertical accent bar (like a section rule), not a horizontal dash that could
   be mistaken for a collapse/expand toggle — these sections do not collapse. */
.doc-content h2::before {
  content: "";
  display: inline-block;
  width: 0.2em;
  height: 0.82em;
  margin-right: 0.5em;
  vertical-align: -0.1em;
  border-radius: 2px;
  background: #2563eb;
}
html[data-theme="dark"] .doc-content h2::before { background: #7bbfcc; }

/* Subsections: accent colour + small dot marker, clearly subordinate to h2 */
.doc-content h3 {
  margin-top: 1.9em;
  font-size: 1.05rem;
  color: #2563eb;
}
html[data-theme="dark"] .doc-content h3 { color: #7bbfcc; }
.doc-content h3::before {
  content: "";
  display: inline-block;
  width: 0.4em;
  height: 0.4em;
  margin-right: 0.45em;
  vertical-align: 0.1em;
  border-radius: 50%;
  background: currentColor;
  opacity: 0.7;
}

/* One-line section lead-in */
.doc-content .doc-lead {
  margin: 0.1em 0 1.4em;
  color: #6b7280;
  font-size: 1.02rem;
  line-height: 1.5;
}
html[data-theme="dark"] .doc-content .doc-lead { color: #9da7b3; }

/* ── Callouts (theme-aware; the global .notice--* boxes are not dark-mode safe) ── */
.doc-content .doc-note,
.doc-content .doc-tip,
.doc-content .doc-warning,
.doc-content .doc-cyan,
.doc-content .doc-key {
  margin: 1.6em 0;
  padding: 0.85em 1.05em;
  border: 1px solid;
  border-left-width: 4px;
  border-radius: 8px;
  font-size: 0.95rem;
}
.doc-content .doc-note > :first-child,
.doc-content .doc-tip > :first-child,
.doc-content .doc-warning > :first-child,
.doc-content .doc-cyan > :first-child,
.doc-content .doc-key > :first-child { margin-top: 0; }
.doc-content .doc-note > :last-child,
.doc-content .doc-tip > :last-child,
.doc-content .doc-warning > :last-child,
.doc-content .doc-cyan > :last-child,
.doc-content .doc-key > :last-child { margin-bottom: 0; }
.doc-content .doc-note   { background: #eff4ff; border-color: #c7d7fe; border-left-color: #2563eb; }
.doc-content .doc-tip    { background: #ecfdf3; border-color: #bbf7d0; border-left-color: #16a34a; }
.doc-content .doc-warning{ background: #fff8eb; border-color: #fde68a; border-left-color: #d97706; }
.doc-content .doc-cyan   { background: #ecfcff; border-color: #b6e6ef; border-left-color: #0e8ba0; }
.doc-content .doc-key    { background: #f5f8ff; border-color: #dbe4ff; border-left-color: #2563eb; }
html[data-theme="dark"] .doc-content .doc-note   { background: rgba(88,166,255,0.08);  border-color: #2f4368; border-left-color: #58a6ff; }
html[data-theme="dark"] .doc-content .doc-tip    { background: rgba(63,185,80,0.09);   border-color: #2a5535; border-left-color: #3fb950; }
html[data-theme="dark"] .doc-content .doc-warning{ background: rgba(210,153,34,0.10);  border-color: #6b5320; border-left-color: #d29922; }
html[data-theme="dark"] .doc-content .doc-cyan   { background: rgba(123,191,204,0.10); border-color: #2f4a52; border-left-color: #7bbfcc; }
html[data-theme="dark"] .doc-content .doc-key    { background: rgba(123,191,204,0.08); border-color: #2f4a52; border-left-color: #7bbfcc; }

/* ── Figures (centered; theme-aware image swap; placeholder box before capture) ── */
.doc-content figure {
  display: block;
  margin: 1.8em auto;
  max-width: 520px;
  text-align: center;
}
/* Full-width figure (spans the text column) */
.doc-content figure.doc-fig-wide { max-width: 100%; }
.doc-content figure img {
  width: 100%;
  height: auto;
  border-radius: 8px;
  border: 1px solid #e5e7eb;
  background: #f3f4f6;
  min-height: 110px;
}
html[data-theme="dark"] .doc-content figure img { border-color: #30363d; background: #161b22; }
.doc-content figcaption {
  margin: 0.6em auto 0;
  color: #6b7280;
  font-family: Georgia, "Times New Roman", serif;
  font-size: 0.85rem;
  font-style: italic;
  line-height: 1.45;
}
html[data-theme="dark"] .doc-content figcaption { color: #9da7b3; }
/* Side-by-side figure rows (galleries) */
.doc-content .doc-figrow {
  display: flex;
  flex-wrap: wrap;
  gap: 14px;
  justify-content: center;
  margin: 1.8em 0;
}
.doc-content .doc-figrow figure { flex: 1 1 200px; max-width: 260px; margin: 0; }
.doc-content .doc-figrow figcaption { font-style: normal; }
/* Wide variant: the row fills the full text column (figures share it equally) */
.doc-content .doc-figrow.doc-figrow-wide figure { max-width: none; }

/* Figure pair: a main (square-ish) render beside a wider-than-tall companion,
   top-aligned. The companion gets a little more width so the two heights roughly
   match. Stacks vertically on narrow screens (companion below the main panel). */
.doc-content .doc-figpair {
  display: flex;
  flex-wrap: wrap;
  gap: 14px;
  align-items: flex-start;
  justify-content: center;
  margin: 1.8em 0;
}
.doc-content .doc-figpair figure { margin: 0; max-width: none; }
.doc-content .doc-figpair .figpair-main { flex: 1 1 260px; }
.doc-content .doc-figpair .figpair-side { flex: 1.3 1 300px; }
.doc-content .doc-figpair figcaption { font-style: normal; }
@media (max-width: 700px) {
  .doc-content .doc-figpair { flex-direction: column; align-items: stretch; }
  .doc-content .doc-figpair figure { flex-basis: auto; }
}
/* Theme image swap: show the variant matching the active theme */
.doc-content .img-dark { display: none; }
html[data-theme="dark"] .doc-content .img-dark { display: block; }
html[data-theme="dark"] .doc-content .img-light { display: none; }

@media (max-width: 700px) {
  .doc-wrap {
    flex-direction: column;
    padding: 20px 16px 60px;
    gap: 0;
    overflow-x: hidden; /* prevent equations/tables from pushing the page wider */
  }
  .doc-sidebar { position: static; max-height: none; margin-bottom: 24px; }
  .doc-content {
    font-size: 0.93rem;
    max-width: 100%;
    overflow-x: hidden;
  }
  /* Equations scroll within their own box rather than overflowing */
  .doc-content .MathJax_Display,
  .doc-content mjx-container[display="true"] {
    overflow-x: auto;
    overflow-y: hidden;
    max-width: 100%;
  }
  /* Tables: fit-content width, scroll if wider than column, no fill */
  .doc-content table {
    display: block;
    width: fit-content;
    max-width: 100%;
    overflow-x: auto;
  }
  /* Figures fill the single column on narrow screens */
  .doc-content figure,
  .doc-content .doc-figrow figure { max-width: 100%; }
}
</style>

<div class="doc-wrap">
  <nav class="doc-sidebar" id="doc-toc">
    <div class="doc-sidebar-title">Contents</div>
    <ul class="doc-toc-list" id="doc-toc-list"></ul>
  </nav>
  <div class="doc-content">
    {% if page.title %}<h1>{{ page.title }}</h1>{% endif %}
    {{ content }}
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function () {
  var list     = document.getElementById('doc-toc-list');
  var content  = document.querySelector('.doc-content');
  if (!list || !content) return;
  var headings = content.querySelectorAll('h2');
  var links    = [];

  headings.forEach(function (h) {
    if (!h.id) {
      h.id = h.textContent.toLowerCase().replace(/[^\w]+/g, '-').replace(/^-|-$/g, '');
    }
    var li = document.createElement('li');
    li.className = h.tagName === 'H3' ? 'toc-h3' : '';
    var a  = document.createElement('a');
    a.href = '#' + h.id;
    a.textContent = h.textContent;
    li.appendChild(a);
    list.appendChild(li);
    links.push({ el: h, a: a });
  });

  if (!window.IntersectionObserver) return;
  var observer = new IntersectionObserver(function (entries) {
    entries.forEach(function (entry) {
      var link = links.find(function (l) { return l.el === entry.target; });
      if (link) link.a.classList.toggle('active', entry.isIntersecting);
    });
  }, { rootMargin: '-10% 0px -80% 0px' });
  links.forEach(function (l) { observer.observe(l.el); });
});
</script>
